<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流水账</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="app">
    <nav id="nav">
      <button class="nav-btn active" data-view="timeline" title="流水">
        <i data-lucide="calendar-days"></i>
      </button>
      <button class="nav-btn" data-view="tags" title="商品标签">
        <span class="nav-symbol">#</span>
      </button>
      <button class="nav-btn" data-view="places" title="地点店铺">
        <span class="nav-symbol">@</span>
      </button>
      <button class="nav-btn" data-view="wishlist" title="种草">
        <i data-lucide="heart"></i>
      </button>
      <button class="nav-btn" id="settings-btn" title="设置">
        <i data-lucide="settings"></i>
      </button>
    </nav>

    <!-- Timeline View -->
    <div id="view-timeline" class="view active">
      <div id="month-header">
        <button id="prev-month"><i data-lucide="chevron-left"></i></button>
        <span id="month-label"></span>
        <button id="next-month"><i data-lucide="chevron-right"></i></button>
      </div>
      <div id="month-summary" class="summary-bar"></div>
      <div id="timeline-list"></div>
      <div id="entry-composer">
        <div id="composer-controls">
          <button id="type-toggle" class="type-btn expense">－</button>
          <label class="wishlist-label">
            <input type="checkbox" id="wishlist-toggle">
            <i data-lucide="heart" class="heart-icon"></i>
          </label>
        </div>
        <div id="input-wrap">
          <div id="entry-input" contenteditable="true" spellcheck="false"
            data-placeholder="记一笔… # 商品  @ 地点  数字=金额  *N/N=评分  %N=进度"></div>
          <div id="autocomplete-menu" class="hidden"></div>
        </div>
        <button id="submit-btn"><i data-lucide="corner-down-left"></i></button>
      </div>
    </div>

    <!-- Tags (#) View -->
    <div id="view-tags" class="view">
      <div id="tag-tree"></div>
    </div>

    <!-- Places (@) View -->
    <div id="view-places" class="view">
      <div id="place-tree"></div>
    </div>

    <!-- Wishlist View -->
    <div id="view-wishlist" class="view">
      <div id="wishlist-list"></div>
    </div>

    <!-- Detail Panel -->
    <div id="detail-panel" class="panel hidden">
      <div class="panel-inner">
        <div class="panel-topbar">
          <button id="detail-back"><i data-lucide="arrow-left"></i> 返回</button>
        </div>
        <div class="panel-header">
          <span id="detail-sigil" class="detail-sigil"></span>
          <h2 id="detail-name" contenteditable="true" spellcheck="false"></h2>
        </div>
        <div id="detail-summary" class="summary-bar"></div>
        <div id="detail-entries"></div>
        <div id="detail-composer">
          <div id="detail-composer-controls">
            <button class="type-btn expense detail-type-toggle">－</button>
            <label class="wishlist-label">
              <input type="checkbox" class="detail-wishlist-toggle">
              <i data-lucide="heart" class="heart-icon"></i>
            </label>
          </div>
          <div id="detail-input-wrap">
            <div class="detail-entry-input" contenteditable="true" spellcheck="false"
              data-placeholder="在此记录…"></div>
            <div class="detail-autocomplete-menu hidden"></div>
          </div>
          <button class="detail-submit-btn"><i data-lucide="corner-down-left"></i></button>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-overlay" class="overlay hidden"></div>
    <div id="settings-modal" class="modal hidden">
      <div class="modal-header">
        <span class="modal-title">主题设置</span>
        <button id="settings-close"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <div class="settings-label">预设主题</div>
          <div id="preset-list" class="preset-list"></div>
        </div>
        <div class="settings-section">
          <div class="settings-label">自定义颜色</div>
          <div id="color-pickers" class="color-pickers"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="theme-reset" class="btn-ghost">恢复默认</button>
        <button id="theme-save" class="btn-primary">保存</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
